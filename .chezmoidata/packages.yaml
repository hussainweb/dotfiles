packages:
  # Homebrew Taps
  taps:
    - atlassian/acli
    - ddev/ddev
    - entireio/tap
    - ksdme/tap
    - olets/tap

  # Command-line tools (Homebrew formulas)
  brews:
    # Essential tools for any system (base layer)
    # Includes core shell utilities and modern CLI replacements
    base:
      - atuin
      - bat
      - bottom
      - btop
      - curl
      - difftastic
      - duf
      - dust
      - eza
      - fd
      - fish
      - fzf
      - git
      - git-delta
      - git-lfs
      - go-task
      - helix
      - htop
      - jq
      - make
      - mise
      - ripgrep
      - starship
      - tree
      - wget
      - xh
      - zellij
      - zsh
      - zsh-abbr
      - zsh-autosuggestions
      - zsh-syntax-highlighting

    # Infrastructure and Container-oriented tools
    container:
      - awscli
      - ddev
      - helm
      - kubernetes-cli
      - opentofu

    # Development tools (languages, AI agents, etc.)
    development:
      - acli
      - direnv
      - gh
      - go
      - hub
      - hyperfine
      - jira-cli
      - lazygit
      - llm
      - node
      - opencode
      - php
      - python3
      - repomix
      - rtk
      - uv

    # Media and heavy processing tools
    media:
      - ffmpeg
      - yt-dlp

    # Extra CLI tools for non-transient machines (standard power-user suite)
    standard_cli:
      - broot
      - cheat
      - coder
      - curlie
      - doggo
      - dyff
      - fx
      - git-extras
      - git-quick-stats
      - glow
      - gnupg
      - gping
      - hexyl
      - httpie
      - lla
      - lsd
      - lstr
      - mkcert
      - mosh
      - pinentry
      - playwright-cli
      - pv
      - specify
      - superfile
      - tailspin
      - the_silver_searcher
      - ut
      - watch
      - xxh
      - xz

    # macOS specific formulas
    macos:
      - mas
      - pinentry-mac

  # macOS Casks (GUI apps and some CLI tools)
  casks:
    # CLI-only tools distributed as casks (preferred on macOS)
    cli:
      - 1password-cli
      - claude-code
      - entire

    # Fonts (Installed if macos=true)
    fonts:
      - font-0xproto-nerd-font
      - font-cascadia-code
      - font-cascadia-code-pl
      - font-cascadia-mono
      - font-cascadia-mono-pl
      - font-caskaydia-cove-nerd-font
      - font-droid-sans-mono-nerd-font
      - font-fira-code-nerd-font
      - font-go-mono-nerd-font
      - font-hack
      - font-hack-nerd-font
      - font-inconsolata
      - font-inconsolata-nerd-font
      - font-jetbrains-mono
      - font-jetbrains-mono-nerd-font
      - font-monaspice-nerd-font

    # Essential GUI (Installed if macos=true)
    macos:
      - 1password
      - choosy
      - comet
      - ghostty
      - google-chrome
      - sublime-text

    # Personal GUI apps (Installed if personal=true)
    personal:
      - claude
      - dayflow
      - disk-inventory-x
      - divvy
      - handbrake-app
      - karabiner-elements
      - logseq
      - loop
      - macshot
      - mounty
      - notion
      - notion-calendar
      - obsidian
      - raycast
      - rectangle
      - shortcat
      - slack
      - sloth
      - stats
      - tailscale-app
      - the-unarchiver
      - vlc
      - wispr-flow
      - zoom

    # Developer-specific GUI tools (Installed if stack=full)
    development:
      - gitup-app
      - imageoptim
      - orbstack
      - visual-studio-code
      - warp
      - zed

    # Large applications and hardware drivers (Installed if workstation=true)
    workstation:
      - antigravity
      - elgato-control-center
      - elgato-stream-deck
      - gnucash
      - logi-options-plus
      - microsoft-office
      - microsoft-teams
      - whatsapp

  # APT packages (fallback or bootstrap for Linux)
  apt:
    - curl
    - git
    - fish
    - zsh

  # Linux-specific configurations (fallbacks for when Casks/Brews don't apply)
  linux:
    npm:
      - "@anthropic-ai/claude-code"
      - "@google/gemini-cli"
    scripts:
      - name: entire
        command: curl -fsSL https://entire.io/install.sh | bash

  # Generic tool initialization
  init:
    rtk:
      - rtk init -g
      - rtk init -g --gemini
      - rtk init --agent antigravity

packages:
  # Homebrew Taps
  taps:
    - ddev/ddev
    - entireio/tap
    - ksdme/tap

  # Command-line tools (Homebrew formulas)
  brews:
    # Essential tools for any system (headless, transient, or laptop)
    minimal:
      - atuin
      - bat
      - btop
      - curl
      - eza
      - fd
      - fish
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - fzf
      - git
      - go-task
      - helix
      - jq
      - mise
      - ripgrep
      - starship
      - tree
      - wget
      - zellij

    # Development-specific tools (languages, AI CLI, dev workflows)
    development:
      - awscli
      - ddev
      - direnv
      - gh
      - go
      - hub
      - hyperfine
      - lazygit
      - llm
      - node
      - opencode
      - opentofu
      - php
      - python3
      - repomix
      - rtk
      - uv

    # Full suite of modern CLI tools for long-lived machines
    standard:
      - bottom
      - broot
      - cheat
      - coder
      - curlie
      - difftastic
      - doggo
      - duf
      - dust
      - dyff
      - fx
      - git-delta
      - git-extras
      - git-lfs
      - git-quick-stats
      - glow
      - gnupg
      - gping
      - hexyl
      - htop
      - httpie
      - jira-cli
      - lla
      - lsd
      - lstr
      - make
      - mkcert
      - mosh
      - pinentry
      - playwright-cli
      - pv
      - specify
      - superfile
      - tailspin
      - the_silver_searcher
      - ut
      - watch
      - xh
      - xxh
      - xz

    # Tools for personal/main machines only
    personal:
      - ffmpeg
      - handbrake
      - helm
      - kubernetes-cli
      - ollama
      - yt-dlp

    # macOS specific formulas
    macos:
      - mas
      - pinentry-mac

  # macOS Casks (GUI apps and some CLI tools)
  casks:
    # CLI-only tools distributed as casks (preferred on macOS)
    cli:
      - 1password-cli
      - claude-code
      - entire

    # Fonts
    fonts:
      - font-0xproto-nerd-font
      - font-cascadia-code
      - font-cascadia-code-pl
      - font-cascadia-mono
      - font-cascadia-mono-pl
      - font-caskaydia-cove-nerd-font
      - font-droid-sans-mono-nerd-font
      - font-fira-code-nerd-font
      - font-go-mono-nerd-font
      - font-hack
      - font-hack-nerd-font
      - font-inconsolata
      - font-inconsolata-nerd-font
      - font-jetbrains-mono
      - font-jetbrains-mono-nerd-font
      - font-monaspice-nerd-font

    # Essential GUI (Browsers, Editor, Terminal, Passwords)
    gui_minimal:
      - 1password
      - choosy
      - comet
      - ghostty
      - google-chrome
      - sublime-text

    # Power-user tools (Standard macOS setup)
    gui_standard:
      - dayflow
      - karabiner-elements
      - loop
      - maccy
      - macshot
      - mounty
      - raycast
      - rectangle
      - shortcat
      - sloth
      - stats
      - tailscale-app
      - wispr-flow

    # Developer-specific GUI tools
    gui_development:
      - gitup-app
      - imageoptim
      - orbstack
      - visual-studio-code
      - warp
      - zed

    # Apps for personal/main machines (Multimedia, Social, Notes)
    gui_personal:
      - claude
      - disk-inventory-x
      - divvy
      - handbrake-app
      - logseq
      - notion
      - notion-calendar
      - obsidian
      - slack
      - the-unarchiver
      - vlc
      - zoom

    # Large applications
    large_apps:
      - antigravity
      - gnucash
      - microsoft-office
      - microsoft-teams
      - whatsapp

    # Hardware/Machine specific
    hardware:
      the-good-machine:
        - elgato-control-center
        - elgato-stream-deck
        - logi-options-plus

  # APT packages (fallback or bootstrap for Linux)
  apt:
    - curl
    - git
    - fish
    - zsh

  # Linux-specific configurations (fallbacks for when Casks/Brews don't apply)
  linux:
    npm:
      - "@anthropic-ai/claude-code"
      - "@google/gemini-cli"
    scripts:
      - name: entire
        command: curl -fsSL https://entire.io/install.sh | bash

  # Generic tool initialization
  init:
    rtk:
      - rtk init -g
      - rtk init -g --gemini
      - rtk init --agent antigravity

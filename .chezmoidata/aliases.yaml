aliases:
  # General
  l: ll -a
  ll: ls -l
  ls: eza -gF --group-directories-first --git

  # Directory Navigation
  "..": cd ..
  "...": cd ../..
  "....": cd ../../..
  ".....": cd ../../../..
  "......": cd ../../../../..

  # Git
  g: git
  gf: git fetch
  gfa: git fetch --all
  gfo: git fetch origin
  gs: git status
  gs.: git status .
  gc: git commit -m
  gm: git merge FETCH_HEAD --ff-only
  gr: git rb FETCH_HEAD
  ga: git add
  ga.: git add .
  gp: git push
  gd: git diff
  gd.: git diff .
  gco: git checkout

  # GitHub PRs
  gpc: gh pr create -f
  gps: gh pr status
  gpm: gh pr merge

  # Other
  bs: brew services
  cw: cd ~/work
